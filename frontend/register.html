<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventEngine — Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 28px;
            color: #fff;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo h1 span { color: #818CF8; }
        .logo p {
            color: #6B7280;
            font-size: 14px;
            margin-top: 6px;
        }
        .card {
            background: #1a1d28;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .tabs {
            display: flex;
            gap: 4px;
            background: #0f1117;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: #6B7280;
        }
        .tab-btn.active {
            background: #4F46E5;
            color: #fff;
        }
        .tab-btn:not(.active):hover { color: #e0e0e0; }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #9CA3AF;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            background: #0f1117;
            border: 1px solid #2d3041;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .form-group input:focus { border-color: #4F46E5; }
        .form-group input::placeholder { color: #4B5563; }
        .optional-label { color: #4B5563; font-weight: 400; }
        .register-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #10B981;
            color: #fff;
            margin-top: 6px;
        }
        .register-btn:hover { background: #059669; }
        .register-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg {
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
        .msg.show { display: block; }
        .msg.error { color: #EF4444; }
        .msg.success { color: #10B981; }
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6B7280;
        }
        .footer-link a {
            color: #818CF8;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-link a:hover { text-decoration: underline; }
        #orgField { display: block; }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <div class="logo">
            <h1>Event<span>Engine</span></h1>
            <p>Create your account</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('organizer')">Organizer</button>
                <button class="tab-btn" onclick="switchTab('participant')">Participant</button>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required minlength="2">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min 6 characters" required minlength="6" maxlength="72">
                </div>
                <div class="form-group" id="orgField">
                    <label for="organization">Organization <span class="optional-label">(optional)</span></label>
                    <input type="text" id="organization" placeholder="Your company or college">
                </div>
                <button type="submit" class="register-btn" id="registerBtn">Register as Organizer</button>
                <div class="msg" id="msgEl"></div>
            </form>

            <div class="footer-link">
                Already have an account? <a href="/frontend/login.html">Login</a>
            </div>
        </div>
    </div>

    <script>
        let currentRole = "organizer";

        function switchTab(role) {
            currentRole = role;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('registerBtn').textContent =
                "Register as " + role.charAt(0).toUpperCase() + role.slice(1);
            document.getElementById('orgField').style.display = role === "organizer" ? "block" : "none";
            document.getElementById('msgEl').classList.remove('show');
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const msgEl = document.getElementById('msgEl');
            msgEl.classList.remove('show', 'error', 'success');
            btn.disabled = true;
            btn.textContent = "Registering...";

            const payload = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
            };
            if (currentRole === "organizer") {
                const org = document.getElementById('organization').value.trim();
                if (org) payload.organization = org;
            }

            try {
                const resp = await fetch(`/api/auth/${currentRole}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();

                if (!resp.ok) {
                    throw new Error(data.detail || "Registration failed");
                }

                msgEl.textContent = "Registered successfully! Redirecting to login...";
                msgEl.classList.add('show', 'success');

                setTimeout(() => {
                    window.location.href = "/frontend/login.html";
                }, 2000);
            } catch (err) {
                msgEl.textContent = err.message;
                msgEl.classList.add('show', 'error');
                btn.disabled = false;
                btn.textContent = "Register as " + currentRole.charAt(0).toUpperCase() + currentRole.slice(1);
            }
        }
    </script>
</body>
</html>
