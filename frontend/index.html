<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventEngine</title>
    <script>
        // Redirect to the appropriate dashboard based on auth state
        (function() {
            var token = localStorage.getItem('ee_token');
            var role = localStorage.getItem('ee_role');
            if (token && role === 'organizer') {
                window.location.replace('/frontend/dashboard.html');
            } else if (token && role === 'participant') {
                window.location.replace('/frontend/participant.html');
            } else {
                window.location.replace('/frontend/login.html');
            }
        })();
    </script>
</head>
</body>
</html>
